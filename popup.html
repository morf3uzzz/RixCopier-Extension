<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RixAI Маркдаун Копир</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="icon.png" alt="RixAI Logo" class="brand-icon">
            </div>
            <h1>RixAI Копир</h1>
        </header>

        <section class="stats-panel">
            <div class="stat-item">
                <span class="stat-label">Токены (~LLM):</span>
                <span class="stat-value" id="token-count">0</span>
            </div>
            <div class="stat-item tooltip">
                <span class="stat-label">Символы:</span>
                <span class="stat-value" id="char-count">0</span>
            </div>
        </section>

        <section class="settings">
            <label class="toggle-container">
                <span class="toggle-label">Шапка (Ссылка, Автор, Дата)</span>
                <div class="toggle-switch">
                    <input type="checkbox" id="toggle-metadata" checked>
                    <span class="slider"></span>
                </div>
            </label>
            <div class="info-text" id="selection-info">Авто: Вся страница или выделенный текст</div>
        </section>

        <main>
            <div class="row-select">
                <button id="select-element" class="btn outline">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143z">
                        </path>
                    </svg>
                    Выбрать блок
                    <div class="info-icon select-info"
                        data-tooltip="ЛКМ: Выбрать 1 блок.&#10;[Своя клавиша + ЛКМ]: Выбрать несколько!">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                    </div>
                </button>
                <button id="print-content" class="btn outline" title="Печать"
                    style="display: flex !important; flex: 1 !important;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 6 2 18 2 18 9"></polyline>
                        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                        <rect x="6" y="14" width="12" height="8"></rect>
                    </svg>
                    Печать
                </button>
                <div class="hotkey-wrapper">
                    <span class="hotkey-label">Мульти:</span>
                    <select id="hotkey-select" class="hotkey-select">
                        <option value="alt">Alt/Opt</option>
                        <option value="ctrl">Ctrl</option>
                        <option value="meta">Cmd/Win</option>
                        <option value="z">Z</option>
                        <option value="x">X</option>
                        <option value="c">C</option>
                        <option value="s">S</option>
                    </select>
                </div>
            </div>

            <button id="copy-md" class="btn secondary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="8" y1="13" x2="16" y2="13"></line>
                    <line x1="8" y1="17" x2="16" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                В буфер (Разметка Markdown)
                <div class="info-icon"
                    data-tooltip="Копирует исходный код Markdown: таблицы, ссылки, заголовки, жирный текст.">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                </div>
            </button>

            <button id="copy-text" class="btn secondary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                В буфер (Обычный текст)
                <div class="info-icon"
                    data-tooltip="Копирует просто текст с абзацами, как будто вы выделили страницу мышкой (без заголовков и ссылок).">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                </div>
            </button>

            <button id="copy-clean" class="btn outline">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
                    <path d="M21 3v5h-5"></path>
                </svg>
                В буфер (Для нейросетей)
                <div class="info-icon"
                    data-tooltip="Самый голый текст. Удаляет все лишние пробелы, картинки и невидимый мусор для максимальной экономии токенов LLM.">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                </div>
            </button>

            <div class="divider">Мульти-сессия</div>

            <button id="session-add" class="btn outline session-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="12" y1="8" x2="12" y2="16"></line>
                    <line x1="8" y1="12" x2="16" y2="12"></line>
                </svg>
                Добавить страницу в Сессию
            </button>

            <button id="session-download" class="btn primary" style="display: none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Скачать Сессию (0 стр.)
            </button>

            <button id="session-clear" class="btn outline danger-text"
                style="display: none; font-size: 0.8rem; padding: 6px;">
                Очистить сессию
            </button>

        </main>

        <footer>
            <div id="status" class="status-msg">Готово</div>
            <a href="https://t.me/+SPaw1ePTGuUxYjYy" target="_blank" class="tg-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                Сообщество RixAI
            </a>
        </footer>
    </div>

    <script src="turndown.js"></script>
    <script src="Readability.js"></script>
    <script src="popup.js"></script>
</body>

</html>
